name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          SPACE_NAME: ${{ secrets.SPACE_NAME }}
        run: |
          python -m pip install -U "huggingface_hub"
          cat << 'EOF' > deploy.py
          import os
          from huggingface_hub import HfApi
          token = os.environ.get("HF_TOKEN")
          user = os.environ.get("HF_USERNAME")
          space = os.environ.get("SPACE_NAME")
          if not token or not user or not space:
              raise ValueError("Missing HF_TOKEN, HF_USERNAME, or SPACE_NAME environment variables in GitHub Secrets!")
          api = HfApi(token=token)
          try:
              api.upload_folder(
                  folder_path=".",
                  repo_id=f"{user}/{space}",
                  repo_type="space",
                  ignore_patterns=[".git/*"]
              )
              print("Successfully uploaded to Hugging Face Spaces!")
          except Exception as e:
              print(f"Error during upload: {e}")
              exit(1)
          EOF
          python deploy.py
